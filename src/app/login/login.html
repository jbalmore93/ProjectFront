<!DOCTYPE html>
<html>
<head>
    <title>
        LOGIN
        </title>
    </head>
    <body>
    <div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card shadow-lg p-4" style="width: 400px; border-radius: 15px;">

    <div class="text-center mb-4">
      <h3 class="fw-bold">Iniciar Sesión</h3>
      <p class="text-muted">Ingrese sus credenciales</p>
    </div>

    <form #loginForm="ngForm" (ngSubmit)="login(loginForm)" novalidate>

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>

        <input 
          type="email"
          class="form-control"
          name="usuario"
          [(ngModel)]="usuario"
          #email="ngModel"
          required
          email
          [class.is-invalid]="email.invalid && email.touched">

        <div class="invalid-feedback" *ngIf="email.invalid && email.touched">
          <div *ngIf="email.errors?.['required']">
            El correo es obligatorio
          </div>
          <div *ngIf="email.errors?.['email']">
            Formato de correo inválido
          </div>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="mb-3">
        <label class="form-label">Contraseña</label>

        <input 
          type="password"
          class="form-control"
          name="password"
          [(ngModel)]="pass"
          #pass="ngModel"
          required
          minlength="6"
          [class.is-invalid]="pass.invalid && pass.touched">

        <div class="invalid-feedback" *ngIf="pass.invalid && pass.touched">
          <div *ngIf="pass.errors?.['required']">
            La contraseña es obligatoria
          </div>
          <div *ngIf="pass.errors?.['minlength']">
            Mínimo 6 caracteres
          </div>
        </div>
      </div>

      <div class="d-grid">
        <button 
          class="btn btn-success"
          type="submit"
          [disabled]="loginForm.invalid">
          Ingresar
        </button>
      </div>

    </form>

  </div>
</div>
    </body>
    </html>
